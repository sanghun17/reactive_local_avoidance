# Local_Avoidance_SH parameters (loaded into the global /Local_Avoidance_SH namespace)
Local_Avoidance_SH:
  # --- repulsion field (APF) ---
  repulsive_m:          2.0    # 척력 영향 반경 (이 거리 이상은 척력 0)
  repulsive_gain:       0.15   # 척력 게인 (세기 배율)

  # --- distance thresholds ---
  lidar_min_threshold:  0.4    # 노이즈컷 (이하 점은 무시 / 자기몸체)
  avoidance_trigger_m:  1.45   # 회피 발동 거리 (최근접 점이 이보다 가까우면 ON)
  emergency_avoidance_m:0.95   # 긴급(강회피) 거리 (이 안이면 5배 척력)
  avoidance_moving_m:   1.45   # 한 번에 움직이는 회피 벡터 최대 길이 (3D)

  # --- two-band gating (raw sensor frame, small-tilt assumption) ---
  band_z_thr:           0.3    # 수평 슬랩 반두께  |z| < band_z_thr  -> x,y 회피
  band_r_thr:           0.3    # 수직 기둥 반경  hypot(x,y) < band_r_thr -> z 회피
